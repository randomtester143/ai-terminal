<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Terminal AI</title>

    <style>
        body {
            margin: 0;
            background: #0f0f0f;
            color: #00ff9c;
            font-family: ui-monospace, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .box {
            width: 100%;
            max-width: 720px;
            padding: 20px;
            border: 1px solid #00ff9c;
            border-radius: 10px;
            background: #111;
        }

        input,
        button {
            font-family: inherit;
        }

        input {
            width: 100%;
            padding: 10px;
            background: #000;
            color: #00ff9c;
            border: 1px solid #00ff9c;
            margin-top: 8px;
        }

        .slider {
            margin-top: 12px;
        }

        .slider input {
            width: 100%;
        }

        .ttl-display {
            margin-top: 6px;
            font-size: 14px;
        }

        .row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .send-btn {
            padding: 10px 14px;
            border: 1px solid #00ff9c;
            background: transparent;
            color: #00ff9c;
            cursor: pointer;
        }

        button {
            padding: 10px;
            margin-top: 12px;
            border: 1px solid #00ff9c;
            background: transparent;
            color: #00ff9c;
            cursor: pointer;
        }

        pre {
            margin-top: 15px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <div class="box">

        <h2>Secure Terminal AI</h2>

        <!-- INIT -->
        <div id="init">

            <label>Session Key</label>
            <input id="sidInput" placeholder="e.g. mychat123" />

            <label>Session Duration</label>
            <div class="ttl-display" id="ttlDisplay">10 min</div>

            <div class="slider">
                <input type="range" id="ttl" min="10" max="120" step="10" value="10">
            </div>

            <button id="createBtn">Create Session</button>

        </div>

        <!-- CHAT -->
        <div id="chat" style="display:none">

            <div>Session: <span id="sidDisplay"></span></div>

            <div class="row">
                <input id="prompt" placeholder="Ask something..." />
                <button class="send-btn" id="sendBtn">→</button>
            </div>

            <button id="endBtn">End Session</button>

            <pre id="output"></pre>

        </div>

    </div>

    <script>

        const sidInput = document.getElementById("sidInput");
        const ttl = document.getElementById("ttl");
        const ttlDisplay = document.getElementById("ttlDisplay");
        const createBtn = document.getElementById("createBtn");

        const init = document.getElementById("init");
        const chat = document.getElementById("chat");

        const sidDisplay = document.getElementById("sidDisplay");
        const prompt = document.getElementById("prompt");
        const output = document.getElementById("output");

        const sendBtn = document.getElementById("sendBtn");
        const endBtn = document.getElementById("endBtn");

        let sid = null;

        // FORMAT TIME
        function format(m) {
            if (m < 60) return m + " min";
            const h = Math.floor(m / 60);
            const r = m % 60;
            return r === 0 ? h + " hr" : h + " hr " + r + " min";
        }

        // SLIDER FIX (snap + clean UX)
        ttl.addEventListener("input", () => {
            let v = Math.round(ttl.value / 10) * 10;
            ttl.value = v;
            ttlDisplay.textContent = format(v);
        });

        // INIT DISPLAY
        ttlDisplay.textContent = format(ttl.value);

        // CREATE SESSION
        createBtn.onclick = async () => {

            const customSid = sidInput.value.trim();

            if (!customSid) {
                output.textContent = "Enter session key";
                return;
            }

            createBtn.textContent = "Creating...";
            createBtn.disabled = true;

            try {
                const res = await fetch("/api/session/create", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ ttl: ttl.value * 60 })
                });

                const data = await res.json();

                if (!res.ok) {
                    output.textContent = data.error;
                    return;
                }

                // USE USER SID (important)
                sid = customSid;

                sidDisplay.textContent = sid;

                init.style.display = "none";
                chat.style.display = "block";

                output.textContent = "Session started.";

            } catch (e) {
                output.textContent = e.message;
            }

            createBtn.textContent = "Create Session";
            createBtn.disabled = false;
        };

        // SEND MESSAGE
        async function ask() {
            if (!sid) return;

            output.textContent = "Thinking...";

            const res = await fetch("/api/ai", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "x-session-id": sid
                },
                body: JSON.stringify({
                    prompt: prompt.value,
                    ttl: ttl.value * 60
                })
            });

            const text = await res.text();
            output.textContent = text;
            prompt.value = "";
        }

        sendBtn.onclick = ask;

        prompt.addEventListener("keydown", e => {
            if (e.key === "Enter") ask();
        });

        // END SESSION
        endBtn.onclick = () => {
            sid = null;
            chat.style.display = "none";
            init.style.display = "block";
            output.textContent = "";
        };

    </script>

</body>

</html>
