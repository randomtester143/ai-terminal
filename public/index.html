<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Terminal AI</title>
    <style>
        body {
            margin: 0;
            background: #0f0f0f;
            color: #00ff9c;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .box {
            width: 100%;
            max-width: 760px;
            padding: 24px;
            border: 1px solid #00ff9c;
            border-radius: 10px;
            background: #111;
            box-shadow: 0 0 20px rgba(0, 255, 156, 0.15);
        }

        h2 {
            margin-top: 0;
        }

        .row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .field.grow {
            flex: 1;
        }

        .field.fixed {
            width: 110px;
        }

        label {
            font-size: 11px;
            color: #5a8a72;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 10px;
            background: #000;
            color: #00ff9c;
            border: 1px solid #00ff9c;
            border-radius: 4px;
            outline: none;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:focus {
            box-shadow: 0 0 8px #00ff9c;
        }

        input.error {
            border-color: #ff4444;
            box-shadow: 0 0 6px #ff4444;
        }

        input::placeholder {
            color: #2a5a40;
        }

        .divider {
            border: none;
            border-top: 1px solid #1a3a2a;
            margin: 16px 0 6px;
        }

        pre {
            margin-top: 12px;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 60px;
        }

        .err {
            color: #ff4444;
        }

        .muted {
            color: #5a8a72;
            font-size: 12px;
            margin-top: 12px;
            margin-bottom: 0;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Secure Terminal AI</h2>

        <div class="row">
            <div class="field grow">
                <label for="sid">Session Key <span style="color:#ff4444">*</span></label>
                <input id="sid" placeholder="4-20 alphanumeric chars" maxlength="20" autocomplete="off"
                    spellcheck="false" />
            </div>
            <div class="field fixed">
                <label for="ttl">TTL (seconds)</label>
                <input id="ttl" type="number" placeholder="3600" min="300" max="7200" />
            </div>
        </div>

        <hr class="divider" />

        <div class="field" style="margin-top:4px">
            <label for="prompt">Prompt</label>
            <input id="prompt" placeholder="Ask something..." autocomplete="off" autofocus />
        </div>

        <pre id="output"></pre>
        <p class="muted">Also accessible via curl. See <code>/api/ai</code>.</p>
    </div>

    <script>
        const sidInput = document.getElementById("sid");
        const ttlInput = document.getElementById("ttl");
        const promptInput = document.getElementById("prompt");
        const output = document.getElementById("output");

        const SID_RE = /^[a-zA-Z0-9]{4,20}$/;
        const LS_KEY = "terminal_ai_sid";

        // Restore sid from localStorage
        const saved = localStorage.getItem(LS_KEY);
        if (saved) sidInput.value = saved;

        // Persist sid to localStorage whenever it changes
        sidInput.addEventListener("input", () => {
            sidInput.classList.remove("error");
            const v = sidInput.value.trim();
            if (SID_RE.test(v)) localStorage.setItem(LS_KEY, v);
        });

        ttlInput.addEventListener("input", () => ttlInput.classList.remove("error"));

        let inFlight = false;

        async function ask(prompt) {
            if (inFlight) return;

            const sid = sidInput.value.trim();
            const ttlRaw = ttlInput.value.trim();

            // Validate sid
            if (!sid) {
                sidInput.classList.add("error");
                output.textContent = "";
                output.innerHTML = '<span class="err">Session key required. Use 4-20 alphanumeric characters.</span>';
                sidInput.focus();
                return;
            }
            if (!SID_RE.test(sid)) {
                sidInput.classList.add("error");
                output.textContent = "";
                output.innerHTML = '<span class="err">Invalid session key. Use 4-20 alphanumeric characters.</span>';
                sidInput.focus();
                return;
            }

            // Validate ttl if provided
            let ttl = undefined;
            if (ttlRaw !== "") {
                const n = Number(ttlRaw);
                if (!Number.isInteger(n) || n < 300 || n > 7200) {
                    ttlInput.classList.add("error");
                    output.textContent = "";
                    output.innerHTML = '<span class="err">Invalid TTL. Must be an integer between 300 and 7200.</span>';
                    ttlInput.focus();
                    return;
                }
                ttl = n;
            }

            inFlight = true;
            output.textContent = "Thinking...";

            const body = { prompt, sid };
            if (ttl !== undefined) body.ttl = ttl;

            try {
                const res = await fetch("/api/ai", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                });
                const text = await res.text();
                if (res.ok) {
                    output.textContent = text;
                } else {
                    output.textContent = "";
                    output.innerHTML = `<span class="err">Error ${res.status}: ${escapeHtml(text)}</span>`;
                }
            } catch (e) {
                output.textContent = "";
                output.innerHTML = `<span class="err">Network error: ${escapeHtml(e.message)}</span>`;
            } finally {
                inFlight = false;
            }
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        promptInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                const q = promptInput.value.trim();
                if (q) ask(q);
            }
        });
    </script>
</body>

</html>
