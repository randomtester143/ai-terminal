<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Terminal AI</title>

    <style>
        body {
            margin: 0;
            background: #0f0f0f;
            color: #00ff9c;
            font-family: ui-monospace, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .box {
            width: 100%;
            max-width: 720px;
            padding: 20px;
            border: 1px solid #00ff9c;
            border-radius: 10px;
            background: #111;
        }

        h2 {
            margin-top: 0;
        }

        label {
            font-size: 12px;
            color: #5a8a72;
        }

        .ttl-display {
            margin-top: 5px;
            font-size: 14px;
        }

        input[type="range"] {
            width: 100%;
            margin-top: 8px;
        }

        .btn {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #00ff9c;
            background: transparent;
            color: #00ff9c;
            cursor: pointer;
        }

        .prompt-row {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            background: #000;
            color: #00ff9c;
            border: 1px solid #00ff9c;
        }

        .send-btn {
            padding: 10px 14px;
            border: 1px solid #00ff9c;
            background: transparent;
            color: #00ff9c;
            cursor: pointer;
        }

        pre {
            margin-top: 15px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Secure Terminal AI</h2>

        <!-- INIT SCREEN -->
        <div id="init">
            <label>Session Duration</label>
            <div class="ttl-display" id="ttlDisplay">10 min</div>

            <input type="range" id="ttl" min="10" max="120" step="10" value="10" />

            <button class="btn" id="create">Create Session</button>
        </div>

        <!-- CHAT SCREEN -->
        <div id="chat" style="display:none;">
            <div>
                Session: <span id="sid"></span>
            </div>

            <div class="prompt-row">
                <input id="prompt" placeholder="Ask something..." />
                <button class="send-btn" id="send">→</button>
            </div>

            <button class="btn" id="end">End Session</button>

            <pre id="output"></pre>
        </div>
    </div>

    <script>
        const ttl = document.getElementById("ttl");
        const ttlDisplay = document.getElementById("ttlDisplay");
        const createBtn = document.getElementById("create");

        const init = document.getElementById("init");
        const chat = document.getElementById("chat");

        const sidEl = document.getElementById("sid");
        const prompt = document.getElementById("prompt");
        const output = document.getElementById("output");

        const sendBtn = document.getElementById("send");
        const endBtn = document.getElementById("end");

        let sid = null;

        function format(m) {
            if (m < 60) return m + " min";
            let h = Math.floor(m / 60);
            let r = m % 60;
            if (r === 0) return h + " hr";
            return h + " hr " + r + " min";
        }

        ttl.addEventListener("input", () => {
            let v = Math.round(ttl.value / 10) * 10;
            ttl.value = v;
            ttlDisplay.textContent = format(v);
        });

        async function createSession() {
            createBtn.textContent = "Creating...";
            createBtn.disabled = true;

            try {
                const res = await fetch("/api/session/create", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ ttl: ttl.value * 60 })
                });

                const data = await res.json();

                if (!res.ok) {
                    output.textContent = "Error: " + data.error;
                    return;
                }

                sid = data.sid;
                sidEl.textContent = sid;

                init.style.display = "none";
                chat.style.display = "block";

                output.textContent = "Session started.";

            } catch (e) {
                output.textContent = "Error: " + e.message;
            }

            createBtn.disabled = false;
            createBtn.textContent = "Create Session";
        }

        async function ask() {
            if (!sid) return;

            output.textContent = "Thinking...";

            const res = await fetch("/api/ai", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "x-session-id": sid
                },
                body: JSON.stringify({ prompt: prompt.value })
            });

            const text = await res.text();
            output.textContent = text;
            prompt.value = "";
        }

        function endSession() {
            sid = null;
            chat.style.display = "none";
            init.style.display = "block";
            output.textContent = "";
        }

        createBtn.onclick = createSession;
        sendBtn.onclick = ask;
        endBtn.onclick = endSession;

        prompt.addEventListener("keydown", e => {
            if (e.key === "Enter") ask();
        });
    </script>
</body>

</html>
